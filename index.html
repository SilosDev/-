    function createLottieInContainer(container, src, size) {

    setInterval(playAnimationOnce, 12000);

    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    class Particle {
        constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.size = Math.random() * 2.5 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.8;
            this.speedY = Math.random() * 1.2 + 0.1;
            this.alpha = Math.random() * 0.5 + 0.1;
            this.color = `rgba(180, 100, 255, ${this.alpha})`;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x > width) this.x = 0;
            if (this.x < 0) this.x = width;
            if (this.y > height) this.y = 0;
            if (this.y < 0) this.y = height;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }
    for (let i = 0; i < 180; i++) particles.push(new Particle());
    function animateParticles() {
        ctx.clearRect(0, 0, width, height);
        for (let p of particles) { p.update(); p.draw(); }
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    function toast(msg, isError) {
        var t = document.getElementById('toastMessage');
        t.textContent = msg;
        if (isError) { t.style.borderLeftColor = '#ff667a'; } else { t.style.borderLeftColor = '#ff44cc'; }

        setTimeout(function() { t.classList.remove('show'); }, 2600);

    const blockedDomains = ['youtube.com', 'www.youtube.com', 'youtu.be', 'facebook.com', 'www.facebook.com', 'instagram.com', 'www.instagram.com', 'twitter.com', 'www.twitter.com', 'x.com', 'tiktok.com', 'www.tiktok.com', 'discord.com', 'www.discord.com', 'google.com', 'www.google.com', 'twitch.tv', 'www.twitch.tv', 'reddit.com', 'www.reddit.com'];

    function isValidTarget(target) {
        let lowerTarget = target.toLowerCase();
        for (let blocked of blockedDomains) {
            if (lowerTarget.includes(blocked)) {
                return { valid: false, reason: 'Social media platforms are blocked' };
            }
        }
        let ipPattern = /^(\d{1,3}\.){3}\d{1,3}$/;
        let domainPattern = /^[a-zA-Z0-9][a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/;
        if (ipPattern.test(lowerTarget)) {
            let parts = lowerTarget.split('.');
            for (let p of parts) {
                if (parseInt(p) > 255) return { valid: false, reason: 'Invalid IP address' };
            }
            return { valid: true };
        } else if (domainPattern.test(lowerTarget)) {
            return { valid: true };
        } else {
            return { valid: false, reason: 'Invalid target' };
        }
    }

    var panes = document.querySelectorAll('.tab-pane');
    for (var i = 0; i < tabsBtns.length; i++) {
        tabsBtns[i].addEventListener('click', function() {

    var currentPps = 0;

    function addLog(msg, isErr) {
        var line = document.createElement('div');
        var now = new Date();
        var time = now.getHours() + ":" + now.getMinutes() + ":" + now.getSeconds();
        line.textContent = "[" + time + "] " + msg;

        logsDiv.appendChild(line);
        line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        if (!isErr) toast(msg.substring(0, 55), false);

        dashMethodSpan.innerText = currentMethodText ? "Method: " + currentMethodText : "";
    }

    function stopAttack() {
        if (attackInterval) { clearInterval(attackInterval); attackInterval = null; }
        if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
        attackActive = false;
        currentPps = 0;
        updateUI();
        addLog("Attack terminated", true);
        toast("Attack stopped", true);
    }

    function startAttack() {
        if (attackActive) { toast("Attack already running", true); return; }
        var target = document.getElementById('attackTarget').value.trim();
        if (!target) { toast("Enter target", true); return; }
        
        var validation = isValidTarget(target);
        if (!validation.valid) {
            toast(validation.reason, true);
            addLog("ERROR: " + validation.reason, true);
            return;
        }
        
        var method = document.getElementById('attackMethod').value;
        var port = parseInt(document.getElementById('attackPort').value);
        if (isNaN(port) || port < 1 || port > 65535) port = 80;
        var packetSize = parseInt(document.getElementById('attackPacketSize').value);
        if (isNaN(packetSize) || packetSize < 64) packetSize = 512;
        if (packetSize > 65507) packetSize = 65507;
        var threads = parseInt(document.getElementById('attackThreads').value);
        if (isNaN(threads) || threads < 1) threads = 50;
        var delay = parseInt(document.getElementById('attackDelay').value);
        if (isNaN(delay)) delay = 0;
        var spoof = document.getElementById('attackSpoof').value === "true";
        var randomPayload = document.getElementById('attackRandom').value === "true";
        var duration = parseInt(document.getElementById('attackDuration').value);
        if (isNaN(duration)) duration = 30;

        currentTargetText = target + ":" + port;
        currentMethodText = method;
        addLog("[INJECT] Target: " + target + ":" + port + " | " + method + " | Size:" + packetSize + " | Threads:" + threads + " | Delay:" + delay + "ms | Spoof:" + (spoof ? "ON" : "OFF") + " | Random:" + (randomPayload ? "ON" : "OFF") + " | Duration:" + duration + "s", false);
        attackActive = true;
        packetTotal = 0;
        updateUI();

        attackInterval = setInterval(function() {
            if (!attackActive) { clearInterval(attackInterval); attackInterval = null; return; }
            var batch = threads;
            if (batch > 24) batch = 24;
            for (var i = 0; i < batch; i++) {
                packetTotal++;
                var spoofPart = "";
                if (spoof) {
                    spoofPart = " (spoof: " + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + ")";
                }
                var payload = "";
                if (randomPayload) {
                    payload = " | payload:" + Math.random().toString(36).substring(2, 10);
                }
                if (method === "HTTP FLOOD") addLog("[HTTP] GET /" + Math.random().toString(36).substring(5) + " -> " + target + ":" + port + spoofPart + payload, false);
                else if (method === "UDP FLOOD") addLog("[UDP] " + target + ":" + port + " | size:" + packetSize + spoofPart + payload, false);
                else if (method === "SYN FLOOD") addLog("[SYN] seq=" + Math.floor(Math.random()*9999999) + " window=65535 -> " + target + ":" + port + spoofPart, false);
                else if (method === "ICMP STORM") addLog("[ICMP] echo request id=" + Math.floor(Math.random()*65535) + " -> " + target + spoofPart, false);
                else if (method === "TCP RST") addLog("[TCP RST] flag=RST -> " + target + ":" + port + spoofPart, false);
                else addLog("[GRE] encapsulated -> " + target + spoofPart, false);
            }
            currentPps = Math.floor(batch * (1000 / (200 + delay)));
            updateUI();
        }, 200 + delay);

        if (duration > 0) {
            stopTimer = setTimeout(function() {
                if (attackActive) {
                    stopAttack();
                    addLog("Attack finished (" + duration + "s)", false);
                }
            }, duration * 1000);
        }
    }

    function generateRandomHWID() {
        return 'HWID-' + Math.random().toString(36).substring(2, 15).toUpperCase();
    }
    function generateRandomMAC() {
        return 'XX:XX:XX:XX:XX:XX'.replace(/XX/g, function() {
            return Math.floor(Math.random()*256).toString(16).padStart(2,'0').toUpperCase();
        });
    }
    function generateRandomIP() {
        return Math.floor(Math.random()*255) + '.' + Math.floor(Math.random()*255) + '.' + Math.floor(Math.random()*255) + '.' + Math.floor(Math.random()*255);
    }
    function generateRandomDevice() {
        var devices = ['iPhone14,2', 'SM-G998B', 'Pixel 6 Pro', 'Windows PC', 'MacBook Pro M2', 'Linux Ubuntu', 'iPad Pro'];
        return devices[Math.floor(Math.random() * devices.length)];
    }

    function updateSpoofResult(msg) {
        var resultDiv = document.getElementById('spoofResult');
        resultDiv.innerHTML = '[' + new Date().toLocaleTimeString() + '] ' + msg;
        addLog(msg, false);
        toast(msg, false);
    }

    document.getElementById('spoofHwidBtn').onclick = function() {
        var newHwid = generateRandomHWID();
        updateSpoofResult('[HWID] Spoofed to: ' + newHwid);
    };
    document.getElementById('spoofMacBtn').onclick = function() {
        var newMac = generateRandomMAC();
        updateSpoofResult('[MAC] Spoofed to: ' + newMac);
    };
    document.getElementById('spoofIpBtn').onclick = function() {
        var newIp = generateRandomIP();
        updateSpoofResult('[IP] Spoofed to: ' + newIp);
    };
    document.getElementById('spoofDeviceBtn').onclick = function() {
        var newDevice = generateRandomDevice();
        updateSpoofResult('[DEVICE] Spoofed to: ' + newDevice);
    };
    document.getElementById('spoofAllBtn').onclick = function() {
        var newHwid = generateRandomHWID();
        var newMac = generateRandomMAC();
        var newIp = generateRandomIP();
        var newDevice = generateRandomDevice();
        updateSpoofResult('[FULL MASK] HWID: ' + newHwid + ' | MAC: ' + newMac + ' | IP: ' + newIp + ' | Device: ' + newDevice);
    };

    document.getElementById('executeBtn').addEventListener('click', startAttack);
    document.getElementById('terminateBtn').addEventListener('click', stopAttack);
    setInterval(function() { if(attackActive) updateUI(); }, 300);
</script>
</body>
</html>
