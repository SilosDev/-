<html lang="pl">
<head>

    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js" type="module"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            background: #000000;
            min-height: 100vh;
        }
        body {
            background: radial-gradient(ellipse at 40% 30%, #0a0518, #000000);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        canvas#particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .lottie-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 180px;
            height: 180px;
            z-index: 1;
            opacity: 0.6;
            pointer-events: none;
        }
        .orb {
            position: fixed;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(180, 60, 220, 0.12), transparent 70%);
            border-radius: 50%;
            top: -30%;
            right: -30%;
            z-index: 0;
            animation: floatGlow 22s infinite alternate ease-in-out;
        }
        .orb2 {
            position: fixed;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(0, 200, 255, 0.08), transparent 70%);
            border-radius: 50%;
            bottom: -40%;
            left: -20%;
            z-index: 0;
            animation: floatGlow2 19s infinite alternate ease-in-out;
        }
        @keyframes floatGlow {
            0% { transform: translate(0,0) scale(1); opacity: 0.3; }
            100% { transform: translate(-70px, 90px) scale(1.5); opacity: 0.6; }
        }
        @keyframes floatGlow2 {
            0% { transform: translate(0,0) scale(1); opacity: 0.2; }
            100% { transform: translate(80px, -70px) scale(1.4); opacity: 0.5; }
        }
        .login-card {
            position: relative;
            z-index: 10;
            width: 380px;
            background: rgba(5, 3, 15, 0.75);
            backdrop-filter: blur(24px);
            border-radius: 48px;
            border: 1px solid rgba(200, 80, 255, 0.4);
            padding: 44px 36px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(200,80,255,0.2);
        }
        .login-card h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff44cc, #aa44ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .login-card p {
            color: #bb99ff;
            margin-bottom: 32px;
            font-size: 13px;
        }
        .login-card input {
            width: 100%;
            background: rgba(10, 5, 25, 0.9);
            border: 1px solid #6633aa;
            border-radius: 40px;
            padding: 14px 20px;
            margin-bottom: 18px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .login-card input:focus {
            border-color: #ff44cc;
            box-shadow: 0 0 15px rgba(255,68,204,0.3);
        }
        .login-card button {
            width: 100%;
            background: linear-gradient(90deg, #aa44ff, #ff44cc);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: 0.1s;
        }
        .login-card button:active { transform: scale(0.97); }
        .error { color: #ff6688; text-align: center; margin-top: 16px; font-size: 13px; }
        
        .main-panel {
            display: none;
            position: relative;
            z-index: 10;
            width: 920px;
            max-width: 95%;
            background: rgba(8, 4, 20, 0.65);
            backdrop-filter: blur(28px);
            border-radius: 56px;
            border: 1px solid rgba(200, 100, 255, 0.35);
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            animation: slideUp 0.6s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .panel-header {
            padding: 28px 36px 0 36px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid rgba(200,100,255,0.2);
            padding-bottom: 18px;
        }
        .panel-header h2 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #ff66ee);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .version-tag {
            background: rgba(100, 50, 160, 0.6);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 10px;
            color: #ffccff;
        }
        .tabs-row {
            display: flex;
            gap: 12px;
            padding: 22px 36px 0 36px;
        }
        .tab-btn {
            background: rgba(30, 15, 55, 0.6);
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            color: #ccaaee;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .tab-btn.active {
            background: linear-gradient(120deg, #aa44ff, #ff44cc);
            color: white;
            box-shadow: 0 0 15px rgba(170,68,255,0.5);
        }
        .tab-pane {
            display: none;
            padding: 28px 36px 36px 36px;
            animation: fadePane 0.3s ease;
        }
        .tab-pane.active { display: block; }
        @keyframes fadePane {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glass-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            padding: 26px;
            margin-bottom: 24px;
            border: 1px solid rgba(200,100,255,0.2);
            backdrop-filter: blur(4px);
        }
        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-box {
            background: rgba(15, 8, 30, 0.8);
            border-radius: 36px;
            padding: 24px 16px;
            flex: 1;
            text-align: center;
            border: 1px solid rgba(200,100,255,0.3);
            transition: 0.2s;
        }
        .stat-box:hover { transform: translateY(-3px); border-color: #ff66ee; }
        .stat-number {
            font-size: 42px;
            font-weight: 800;
            color: #ffbbff;
        }
        .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #aa88dd;
            margin-top: 8px;
        }
        input, select {
            background: rgba(8, 4, 20, 0.9);
            border: 1px solid #5533aa;
            border-radius: 36px;
            padding: 12px 20px;
            width: 100%;
            color: #f0eaff;
            font-size: 14px;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #ff44cc;
            box-shadow: 0 0 10px rgba(255,68,204,0.2);
        }
        .double { display: flex; gap: 16px; }
        .btn {
            border: none;
            padding: 12px 24px;
            border-radius: 44px;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
            transition: 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-exec { background: linear-gradient(90deg, #aa44ff, #ff44cc); color: white; }
        .btn-stop { background: #882244; color: #ffbbdd; border: 1px solid #ff66aa; }
        .logs-window {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 36px;
            padding: 20px;
            height: 280px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #aaffdd;
            border: 1px solid rgba(200,100,255,0.2);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(25, 10, 45, 0.95);
            backdrop-filter: blur(24px);
            border-left: 5px solid #ff44cc;
            padding: 14px 28px;
            border-radius: 60px;
            color: #ffeef8;
            font-size: 13px;
            z-index: 999;
            transform: translateX(500px);
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            box-shadow: 0 6px 20px black;
            font-weight: 500;
        }
        .toast.show { transform: translateX(0); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a1030; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cc66ff; border-radius: 10px; }
    </style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div class="lottie-container">
    <dotlottie-wc src="https://lottie.host/33ee256d-6df6-4829-9568-ff066f9c3de5/MsowL0wALe.lottie" style="width: 100%;height: 100%" autoplay loop></dotlottie-wc>
</div>

            <div class="stat-box"><div class="stat-number" id="statStatusDash">BEZ RUCHU</div><div class="label">STATUS</div></div>

            <div style="margin-bottom: 20px;">
                <label style="display:block; margin-bottom:8px; color:#bbaaee;">CEL (IP / DOMENA)</label>
                <input type="text" id="attackTarget" placeholder="example.com | 1.2.3.4">
            </div>

                <label style="display:block; margin-bottom:8px; color:#bbaaee;">METODA</label>
                <select id="attackMethod">
                    <option value="HTTP FLOOD">HTTP FLOOD (L7)</option>

                <div style="flex:1"><label style="display:block; margin-bottom:8px; color:#bbaaee;">WĄTKI</label><input type="number" id="attackThreads" value="75" min="1"></div>
                <div style="flex:1"><label style="display:block; margin-bottom:8px; color:#bbaaee;">SPOOF IP</label><select id="attackSpoof"><option value="true">ON</option><option value="false">OFF</option></select></div>

                <label style="display:block; margin-bottom:8px; color:#bbaaee;">CZAS (sekundy, 0 = bez limitu)</label>
                <input type="number" id="attackDuration" value="35" min="0">
            </div>
            <div style="display: flex; gap: 16px; margin-top: 10px;">
                <button class="btn btn-exec" id="executeBtn">💣 WYJEB BOMBE</button>
                <button class="btn btn-stop" id="terminateBtn">⛔ ZATRZYMAJ</button>
            </div>
        </div>
    </div>

    <div id="tabLogs" class="tab-pane">
        <div class="logs-window" id="logsContainer">
            <div>[system] Silk SYN v9.0 online</div>
            <div>[system] gotowy do rozpierdolu</div>
        </div>
    </div>
</div>

<div id="toastMessage" class="toast">gotowy</div>

<script>
    // PARTICLE SYSTEM
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    class Particle {
        constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.size = Math.random() * 2.5 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.8;
            this.speedY = Math.random() * 1.2 + 0.1;
            this.alpha = Math.random() * 0.5 + 0.1;
            this.color = `rgba(180, 100, 255, ${this.alpha})`;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x > width) this.x = 0;
            if (this.x < 0) this.x = width;
            if (this.y > height) this.y = 0;
            if (this.y < 0) this.y = height;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }
    for (let i = 0; i < 180; i++) particles.push(new Particle());
    function animateParticles() {
        ctx.clearRect(0, 0, width, height);
        for (let p of particles) { p.update(); p.draw(); }
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // TOAST
    function toast(msg, isError) {
        var t = document.getElementById('toastMessage');
        t.textContent = msg;
        if (isError) { t.style.borderLeftColor = '#ff667a'; } else { t.style.borderLeftColor = '#ff44cc'; }
        t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 2600);
    }

    // BLOKOWANE STRONY
    const blockedDomains = ['youtube.com', 'www.youtube.com', 'youtu.be', 'facebook.com', 'www.facebook.com', 'instagram.com', 'www.instagram.com', 'twitter.com', 'www.twitter.com', 'x.com', 'tiktok.com', 'www.tiktok.com', 'discord.com', 'www.discord.com', 'google.com', 'www.google.com', 'twitch.tv', 'www.twitch.tv', 'reddit.com', 'www.reddit.com'];

    function isValidTarget(target) {
        let lowerTarget = target.toLowerCase();
        for (let blocked of blockedDomains) {
            if (lowerTarget.includes(blocked)) {
                return { valid: false, reason: 'Nie można atakować serwisów społecznościowych (YouTube, Facebook, Instagram, TikTok, Discord, Google itp.)' };
            }
        }
        let ipPattern = /^(\d{1,3}\.){3}\d{1,3}$/;
        let domainPattern = /^[a-zA-Z0-9][a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/;
        if (ipPattern.test(lowerTarget)) {
            let parts = lowerTarget.split('.');
            for (let p of parts) {
                if (parseInt(p) > 255) return { valid: false, reason: 'Nieprawidłowy adres IP' };
            }
            return { valid: true };
        } else if (domainPattern.test(lowerTarget)) {
            return { valid: true };
        } else {
            return { valid: false, reason: 'Nie ma takiego adresu / strony' };
        }
    }

    // LOGOWANIE
    document.getElementById('doLogin').onclick = function() {
        var u = document.getElementById('loginUser').value;
        var p = document.getElementById('loginPass').value;
        if (u === "Silos" && p === "Licka") {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('appPanel').style.display = 'block';
            toast("Wbijasz! Silk SYN gotowy do roboty", false);
        } else {
            document.getElementById('loginMsg').innerText = "Złe dane debilu";
            toast("Nie udało się", true);
        }
    };

    // ZAKŁADKI
    var tabsBtns = document.querySelectorAll('.tab-btn');
    var panes = document.querySelectorAll('.tab-pane');
    for (var i = 0; i < tabsBtns.length; i++) {
        tabsBtns[i].addEventListener('click', function() {
            var id = this.getAttribute('data-tab');
            for (var j = 0; j < tabsBtns.length; j++) {
                tabsBtns[j].classList.remove('active');
            }
            this.classList.add('active');
            for (var k = 0; k < panes.length; k++) {
                panes[k].classList.remove('active');
            }
            document.getElementById(id).classList.add('active');
        });
    }

    // DDoS ENGINE
    var attackActive = false;
    var attackInterval = null;
    var stopTimer = null;
    var packetTotal = 0;
    var currentPps = 0;
    var currentTargetText = "";
    var currentMethodText = "";

    var logsDiv = document.getElementById('logsContainer');
    var statPacketsSpan = document.getElementById('statPacketsDash');
    var statStatusSpan = document.getElementById('statStatusDash');
    var statPpsSpan = document.getElementById('statPpsDash');
    var dashTargetSpan = document.getElementById('dashTargetInfo');
    var dashMethodSpan = document.getElementById('dashMethodInfo');

    function addLog(msg, isErr) {
        var line = document.createElement('div');
        var now = new Date();
        var time = now.getHours() + ":" + now.getMinutes() + ":" + now.getSeconds();
        line.textContent = "[" + time + "] " + msg;
        if (isErr) line.style.color = "#ffa5bb";
        logsDiv.appendChild(line);
        line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        if (!isErr) toast(msg.substring(0, 55), false);
    }

    function updateUI() {
        statPacketsSpan.innerText = packetTotal;
        statStatusSpan.innerText = attackActive ? "ATakuje!" : "BEZ RUCHU";
        statPpsSpan.innerText = currentPps;
        dashTargetSpan.innerText = currentTargetText || "—";
        dashMethodSpan.innerText = currentMethodText ? "Metoda: " + currentMethodText : "";
    }

    function stopAttack() {
        if (attackInterval) { clearInterval(attackInterval); attackInterval = null; }
        if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
        attackActive = false;
        currentPps = 0;
        updateUI();
        addLog("Atak zatrzymany!", true);
        toast("Atak zatrzymany", true);
    }

    function startAttack() {
        if (attackActive) { toast("Atak już leci!", true); return; }
        var target = document.getElementById('attackTarget').value.trim();
        if (!target) { toast("Wpisz cel!", true); return; }
        
        var validation = isValidTarget(target);
        if (!validation.valid) {
            toast(validation.reason, true);
            addLog("BLAD: " + validation.reason, true);
            return;
        }
        
        var method = document.getElementById('attackMethod').value;
        var threads = parseInt(document.getElementById('attackThreads').value);
        if (isNaN(threads) || threads < 1) threads = 50;
        var spoof = document.getElementById('attackSpoof').value === "true";
        var duration = parseInt(document.getElementById('attackDuration').value);
        if (isNaN(duration)) duration = 30;

        currentTargetText = target;
        currentMethodText = method;
        addLog("[START] Cel: " + target + " | " + method + " | Watki:" + threads + " | Spoof:" + (spoof ? "ON" : "OFF") + " | Czas:" + duration + "s", false);
        attackActive = true;
        packetTotal = 0;
        updateUI();

        attackInterval = setInterval(function() {
            if (!attackActive) { clearInterval(attackInterval); attackInterval = null; return; }
            var batch = threads;
            if (batch > 24) batch = 24;
            for (var i = 0; i < batch; i++) {
                packetTotal++;
                var spoofPart = "";
                if (spoof) {
                    spoofPart = " (spoof: " + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + ")";
                }
                if (method === "HTTP FLOOD") addLog("[HTTP] GET /" + Math.random().toString(36).substring(5) + " -> " + target + spoofPart, false);
                else if (method === "UDP FLOOD") addLog("[UDP] " + target + ":" + Math.floor(Math.random()*60000) + " | len " + (Math.floor(Math.random()*900)+100) + spoofPart, false);
                else if (method === "SYN FLOOD") addLog("[SYN] seq=" + Math.floor(Math.random()*9999999) + " window=65535 -> " + target + spoofPart, false);
                else addLog("[ICMP] echo request id=" + Math.floor(Math.random()*65535) + " -> " + target + spoofPart, false);
            }
            currentPps = Math.floor(batch * 4.2);
            updateUI();
        }, 200);

        if (duration > 0) {
            stopTimer = setTimeout(function() {
                if (attackActive) {
                    stopAttack();
                    addLog("Atak zakonczony (" + duration + "s)", false);
                }
            }, duration * 1000);
        }
    }

    document.getElementById('executeBtn').addEventListener('click', startAttack);
    document.getElementById('terminateBtn').addEventListener('click', stopAttack);
    setInterval(function() { if(attackActive) updateUI(); }, 300);
</script>
</body>
</html>
