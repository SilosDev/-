<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <title>SILK BY ?? | Panel</title>
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js" type="module"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }
        body {
            background: #05050A;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
            cursor: crosshair;
        }
        a, button, input, select, .tab, .btn, .stat, .glass-card, .login-container, .main-panel {
            cursor: crosshair;
        }
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #020105);
        }
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 10px);
            animation: shiftBg 40s linear infinite;
        }
        @keyframes shiftBg {
            0% { transform: translate(0,0); }
            100% { transform: translate(60px, 60px); }
        }
        .floating-lottie {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            z-index: 0;
            opacity: 0.2;
            pointer-events: none;
        }
        .crosshair-glow {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 2px solid #ff44cc;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px #ff44cc;
            transition: 0.05s linear;
        }
        .login-container {
            position: relative;
            z-index: 10;
            width: 400px;
            background: rgba(10, 8, 22, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            border: 1px solid rgba(200, 120, 255, 0.4);
            padding: 48px 40px;
            text-align: center;
        }
        .login-container h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #dd88ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        .login-container p {
            color: #aa99dd;
            margin-bottom: 32px;
        }
        .login-container input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid #5533aa;
            border-radius: 60px;
            padding: 14px 20px;
            margin-bottom: 16px;
            color: white;
            font-size: 15px;
        }
        .login-container input:focus {
            border-color: #ff66ee;
            outline: none;
        }
        .login-container button {
            width: 100%;
            background: linear-gradient(90deg, #aa44ff, #ff44cc);
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            color: white;
            cursor: crosshair;
        }
        .main-panel {
            display: none;
            position: relative;
            z-index: 10;
            width: 1300px;
            max-width: 98%;
            background: rgba(8, 5, 20, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            border: 1px solid rgba(200, 100, 255, 0.35);
            overflow: hidden;
        }
        .panel-top {
            padding: 28px 36px;
            border-bottom: 1px solid rgba(200,100,255,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-top h2 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ff88ee);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tabs {
            display: flex;
            gap: 8px;
            padding: 0 36px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .tab {
            background: rgba(30, 20, 50, 0.6);
            padding: 12px 28px;
            border-radius: 40px;
            color: #ccaaee;
            cursor: crosshair;
            font-weight: 600;
            transition: 0.2s;
        }
        .tab.active {
            background: linear-gradient(120deg, #aa44ff, #ff44cc);
            color: white;
            box-shadow: 0 0 12px rgba(170,68,255,0.5);
        }
        .tab-content {
            display: none;
            padding: 32px 36px;
            animation: fade 0.3s;
        }
        .tab-content.active { display: block; }
        @keyframes fade {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stats-grid {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat {
            background: rgba(0,0,0,0.4);
            border-radius: 32px;
            padding: 24px;
            flex: 1;
            text-align: center;
            border: 1px solid rgba(200,100,255,0.2);
        }
        .stat-number {
            font-size: 44px;
            font-weight: 800;
            color: #ffccff;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #bbaaee;
            font-size: 12px;
        }
        input, select {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid #5533aa;
            border-radius: 32px;
            padding: 12px 18px;
            color: white;
        }
        .row-2, .row-3, .row-4 {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }
        .row-2 > *, .row-3 > *, .row-4 > * { flex: 1; }
        button {
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: crosshair;
        }
        .btn-primary {
            background: linear-gradient(90deg, #aa44ff, #ff44cc);
            color: white;
        }
        .btn-danger {
            background: #882244;
            color: white;
        }
        .btn-spoof {
            background: linear-gradient(90deg, #44aaff, #44ffcc);
            color: black;
        }
        .logs-area {
            background: rgba(0,0,0,0.6);
            border-radius: 32px;
            padding: 20px;
            height: 280px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #aaffdd;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a0f2a;
            backdrop-filter: blur(16px);
            border-left: 4px solid #ff44cc;
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            z-index: 1000;
            transform: translateX(400px);
            transition: 0.3s;
        }
        .toast.show { transform: translateX(0); }
        .spoof-output {
            background: #0a0520;
            border-radius: 28px;
            padding: 16px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            color: #44ffaa;
        }
        .validation-badge {
            background: #1a0f2a;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            display: inline-block;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="animated-bg"></div>
<div class="floating-lottie" id="mainLottie"></div>
<div class="crosshair-glow" id="crosshair"></div>

<div id="loginView" class="login-container">
    <h1>SILK BY ??</h1>
    <p>next generation security panel</p>
    <input type="text" id="loginUser" placeholder="username">
    <input type="password" id="loginPass" placeholder="password">
    <button id="doLogin">Access</button>
    <div id="loginError" style="color:#ff6688; margin-top:16px;"></div>
</div>

<div id="appPanel" class="main-panel">
    <div class="panel-top">
        <h2>SILK <span style="color:#ff66ee">BY ??</span></h2>
        <div class="version-tag" style="background:#2a1a4a; padding:6px 16px; border-radius:40px; font-size:11px;">v12.0</div>
    </div>
    <div class="tabs">
        <div class="tab active" data-tab="dashboard">Dashboard</div>
        <div class="tab" data-tab="ddos">DDoS Inject</div>
        <div class="tab" data-tab="spoofer">Vinted Spoofer</div>
        <div class="tab" data-tab="logs">Logs</div>
    </div>

    <div id="dashboard" class="tab-content active">
        <div class="stats-grid">
            <div class="stat"><div class="stat-number" id="statPackets">0</div><div>Packets</div></div>
            <div class="stat"><div class="stat-number" id="statStatus">Idle</div><div>Status</div></div>
            <div class="stat"><div class="stat-number" id="statPps">0</div><div>PPS</div></div>
        </div>
        <div class="stat" style="text-align:left;">
            <div style="color:#ccb5ff; margin-bottom:8px;">Current Target</div>
            <div id="dashTarget" style="font-size:18px;">—</div>
            <div id="dashValidation" class="validation-badge"></div>
        </div>
    </div>

    <div id="ddos" class="tab-content">
        <div class="row-3">
            <div class="form-group"><label>Target (IP / Domain)</label><input type="text" id="ddosTarget" placeholder="example.com / 1.2.3.4"></div>
            <div class="form-group"><label>Method</label><select id="ddosMethod"><option>HTTP Flood</option><option>UDP Flood</option><option>SYN Flood</option><option>ICMP Storm</option><option>TCP RST</option></select></div>
            <div class="form-group"><label>Port</label><input type="number" id="ddosPort" value="80"></div>
        </div>
        <div class="row-4">
            <div class="form-group"><label>Threads</label><input type="number" id="ddosThreads" value="80"></div>
            <div class="form-group"><label>Packet Size</label><input type="number" id="ddosSize" value="512"></div>
            <div class="form-group"><label>Delay (ms)</label><input type="number" id="ddosDelay" value="0"></div>
            <div class="form-group"><label>Spoof IP</label><select id="ddosSpoof"><option>OFF</option><option>ON</option></select></div>
        </div>
        <div class="row-2">
            <div class="form-group"><label>Duration (sec)</label><input type="number" id="ddosDuration" value="30"></div>
            <div class="form-group"><label>Random Payload</label><select id="ddosRandom"><option>OFF</option><option>ON</option></select></div>
        </div>
        <div id="targetValidationMsg" class="validation-badge" style="margin-bottom:16px;"></div>
        <div style="display:flex; gap:16px;">
            <button class="btn-primary" id="startInject">Inject Process</button>
            <button class="btn-danger" id="stopInject">Terminate</button>
        </div>
    </div>

    <div id="spoofer" class="tab-content">
        <div class="row-4">
            <button class="btn-spoof" id="spoofHwid">HWID Spoof</button>
            <button class="btn-spoof" id="spoofMac">MAC Spoof</button>
            <button class="btn-spoof" id="spoofIp">IP Spoof</button>
            <button class="btn-spoof" id="spoofDevice">Device Spoof</button>
        </div>
        <button class="btn-primary" id="spoofAll" style="width:100%; margin-top:8px;">Full Mask Spoof</button>
        <div id="spoofResult" class="spoof-output">[ready]</div>
    </div>

    <div id="logs" class="tab-content">
        <div class="logs-area" id="logsContainer">
            <div>[system] SILK BY ?? v12.0 ready</div>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast">ready</div>

<script>
    const crosshair = document.getElementById('crosshair');
    document.addEventListener('mousemove', (e) => {
        crosshair.style.left = e.clientX + 'px';
        crosshair.style.top = e.clientY + 'px';
    });

    const mainLottie = document.getElementById('mainLottie');
    if (mainLottie) {
        const lottieEl = document.createElement('dotlottie-wc');
        lottieEl.setAttribute('src', 'https://lottie.host/33ee256d-6df6-4829-9568-ff066f9c3de5/MsowL0wALe.lottie');
        lottieEl.style.width = '100%';
        lottieEl.style.height = '100%';
        lottieEl.setAttribute('autoplay', '');
        lottieEl.setAttribute('loop', '');
        mainLottie.appendChild(lottieEl);
    }

    function toast(msg, isErr) {
        const t = document.getElementById('toastMsg');
        t.textContent = msg;
        t.style.borderLeftColor = isErr ? '#ff667a' : '#ff44cc';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    document.getElementById('doLogin').onclick = () => {
        const u = document.getElementById('loginUser').value;
        const p = document.getElementById('loginPass').value;
        if (u === 'Silos' && p === 'Licka') {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('appPanel').style.display = 'block';
            toast('Access granted', false);
        } else {
            document.getElementById('loginError').innerText = 'Invalid credentials';
            toast('Login failed', true);
        }
    };

    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(t => {
        t.addEventListener('click', () => {
            const id = t.getAttribute('data-tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            t.classList.add('active');
            contents.forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        });
    });

    const blockedDomains = ['youtube.com', 'www.youtube.com', 'youtu.be', 'facebook.com', 'www.facebook.com', 'instagram.com', 'www.instagram.com', 'tiktok.com', 'www.tiktok.com', 'twitter.com', 'www.twitter.com', 'x.com', 'discord.com', 'www.discord.com', 'google.com', 'www.google.com', 'twitch.tv', 'www.twitch.tv', 'reddit.com', 'www.reddit.com', 'snapchat.com', 'telegram.org', 'whatsapp.com'];

    function isValidIp(ip) {
        const parts = ip.split('.');
        if (parts.length !== 4) return false;
        return parts.every(p => {
            const num = parseInt(p);
            return !isNaN(num) && num >= 0 && num <= 255;
        });
    }

    function isValidDomain(domain) {
        const regex = /^[a-zA-Z0-9][a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/;
        return regex.test(domain);
    }

    function isBlocked(target) {
        const lower = target.toLowerCase();
        return blockedDomains.some(b => lower.includes(b));
    }

    async function validateTarget(target) {
        if (!target) return { valid: false, reason: 'Empty target' };
        if (isBlocked(target)) return { valid: false, reason: 'Social media platforms are blocked' };
        if (isValidIp(target)) return { valid: true, reason: 'Valid IP address' };
        if (isValidDomain(target)) {
            return { valid: true, reason: 'Valid domain (syntax)' };
        }
        return { valid: false, reason: 'Invalid IP or domain format' };
    }

    const targetInput = document.getElementById('ddosTarget');
    const validationMsgDiv = document.getElementById('targetValidationMsg');
    const dashValidation = document.getElementById('dashValidation');

    async function updateValidation() {
        const target = targetInput.value.trim();
        if (!target) {
            validationMsgDiv.innerHTML = '';
            dashValidation.innerHTML = '';
            return;
        }
        const result = await validateTarget(target);
        if (result.valid) {
            validationMsgDiv.innerHTML = '✓ ' + result.reason;
            validationMsgDiv.style.color = '#88ff88';
            dashValidation.innerHTML = 'Target valid: ' + result.reason;
            dashValidation.style.color = '#88ff88';
        } else {
            validationMsgDiv.innerHTML = '✗ ' + result.reason;
            validationMsgDiv.style.color = '#ff8888';
            dashValidation.innerHTML = 'Invalid target';
            dashValidation.style.color = '#ff8888';
        }
    }

    targetInput.addEventListener('input', updateValidation);

    let attackActive = false, attackInterval = null, stopTimer = null;
    let packetTotal = 0, currentPps = 0, currentTarget = '', currentMethod = '';
    const logsDiv = document.getElementById('logsContainer');
    const statPackets = document.getElementById('statPackets');
    const statStatus = document.getElementById('statStatus');
    const statPps = document.getElementById('statPps');
    const dashTarget = document.getElementById('dashTarget');

    function addLog(msg, isErr) {
        const line = document.createElement('div');
        const t = new Date();
        line.textContent = `[${t.getHours()}:${t.getMinutes()}:${t.getSeconds()}] ${msg}`;
        if (isErr) line.style.color = '#ffa5bb';
        logsDiv.appendChild(line);
        line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        if (!isErr) toast(msg.slice(0, 50), false);
    }

    function updateUI() {
        statPackets.innerText = packetTotal;
        statStatus.innerText = attackActive ? 'ATTACKING' : 'IDLE';
        statPps.innerText = currentPps;
        dashTarget.innerText = currentTarget || '—';
    }

    function stopAttack() {
        if (attackInterval) clearInterval(attackInterval);
        if (stopTimer) clearTimeout(stopTimer);
        attackActive = false;
        currentPps = 0;
        updateUI();
        addLog('Attack terminated', true);
        toast('Attack stopped', true);
    }

    async function startAttack() {
        if (attackActive) { toast('Already running', true); return; }
        const target = document.getElementById('ddosTarget').value.trim();
        if (!target) { toast('Enter target', true); return; }
        
        const validation = await validateTarget(target);
        if (!validation.valid) {
            toast(validation.reason, true);
            addLog('ERROR: ' + validation.reason, true);
            return;
        }
        
        const method = document.getElementById('ddosMethod').value;
        const port = parseInt(document.getElementById('ddosPort').value) || 80;
        let threads = parseInt(document.getElementById('ddosThreads').value) || 50;
        threads = Math.min(threads, 35);
        const size = parseInt(document.getElementById('ddosSize').value) || 512;
        const delay = parseInt(document.getElementById('ddosDelay').value) || 0;
        const spoof = document.getElementById('ddosSpoof').value === 'ON';
        const duration = parseInt(document.getElementById('ddosDuration').value) || 30;
        const randomPayload = document.getElementById('ddosRandom').value === 'ON';

        currentTarget = `${target}:${port}`;
        currentMethod = method;
        addLog(`[INJECT] ${target}:${port} | ${method} | thr:${threads} | size:${size} | spoof:${spoof} | dur:${duration}s`, false);
        attackActive = true;
        packetTotal = 0;
        updateUI();

        attackInterval = setInterval(() => {
            if (!attackActive) { clearInterval(attackInterval); return; }
            for (let i = 0; i < threads; i++) {
                packetTotal++;
                const spoofPart = spoof ? ` (spoof: ${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)})` : '';
                const randPayload = randomPayload ? ` | payload:${Math.random().toString(36).substring(4)}` : '';
                if (method === 'HTTP Flood') addLog(`[HTTP] GET /${Math.random().toString(36).substring(4)} -> ${target}:${port}${spoofPart}${randPayload}`, false);
                else if (method === 'UDP Flood') addLog(`[UDP] ${target}:${port} | size:${size}${spoofPart}`, false);
                else if (method === 'SYN Flood') addLog(`[SYN] seq=${Math.floor(Math.random()*9999999)} -> ${target}:${port}${spoofPart}`, false);
                else if (method === 'ICMP Storm') addLog(`[ICMP] echo id=${Math.floor(Math.random()*65535)} -> ${target}${spoofPart}`, false);
                else addLog(`[TCP RST] flag=RST -> ${target}:${port}${spoofPart}`, false);
            }
            currentPps = Math.floor(threads * (1000 / (200 + delay)));
            updateUI();
        }, 200 + delay);

        if (duration > 0) stopTimer = setTimeout(() => { if (attackActive) { stopAttack(); addLog(`Attack finished (${duration}s)`, false); } }, duration * 1000);
    }

    document.getElementById('startInject').addEventListener('click', startAttack);
    document.getElementById('stopInject').addEventListener('click', stopAttack);

    function randomHWID() { return 'HWID-' + Math.random().toString(36).substring(2, 12).toUpperCase(); }
    function randomMAC() { return [...Array(6)].map(() => Math.floor(Math.random()*256).toString(16).padStart(2,'0')).join(':').toUpperCase(); }
    function randomIP() { return `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`; }
    function randomDevice() { return ['iPhone15,2','SM-S918B','Pixel 8 Pro','Windows 11 PC','MacBook Air M2','Linux x86_64'][Math.floor(Math.random()*6)]; }

    const spoofOut = document.getElementById('spoofResult');
    document.getElementById('spoofHwid').onclick = () => { const v = randomHWID(); spoofOut.innerHTML = `[HWID] ${v}`; addLog(`HWID spoofed: ${v}`, false); toast(`HWID: ${v}`, false); };
    document.getElementById('spoofMac').onclick = () => { const v = randomMAC(); spoofOut.innerHTML = `[MAC] ${v}`; addLog(`MAC spoofed: ${v}`, false); toast(`MAC: ${v}`, false); };
    document.getElementById('spoofIp').onclick = () => { const v = randomIP(); spoofOut.innerHTML = `[IP] ${v}`; addLog(`IP spoofed: ${v}`, false); toast(`IP: ${v}`, false); };
    document.getElementById('spoofDevice').onclick = () => { const v = randomDevice(); spoofOut.innerHTML = `[DEVICE] ${v}`; addLog(`Device spoofed: ${v}`, false); toast(`Device: ${v}`, false); };
    document.getElementById('spoofAll').onclick = () => { const h = randomHWID(), m = randomMAC(), i = randomIP(), d = randomDevice(); spoofOut.innerHTML = `[FULL] HWID: ${h} | MAC: ${m} | IP: ${i} | Device: ${d}`; addLog(`Full spoof: ${h} / ${m} / ${i} / ${d}`, false); toast('Full spoof applied', false); };

    setInterval(() => { if (attackActive) updateUI(); }, 300);
    updateValidation();
</script>
</body>
</html>
