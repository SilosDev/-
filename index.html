<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <title>Silk SYN | DDoS Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            background: #000000;
            min-height: 100vh;
        }
        body {
            background: radial-gradient(ellipse at 40% 20%, #0c0a1a, #020105);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .orb {
            position: fixed;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(100, 70, 200, 0.15), transparent 70%);
            border-radius: 50%;
            top: -30%;
            right: -30%;
            z-index: 0;
            animation: floatGlow 20s infinite alternate ease-in-out;
        }
        .orb2 {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(180, 100, 255, 0.08), transparent 70%);
            border-radius: 50%;
            bottom: -30%;
            left: -20%;
            z-index: 0;
            animation: floatGlow2 18s infinite alternate ease-in-out;
        }
        @keyframes floatGlow {
            0% { transform: translate(0,0) scale(1); opacity: 0.3; }
            100% { transform: translate(-60px, 80px) scale(1.4); opacity: 0.6; }
        }
        @keyframes floatGlow2 {
            0% { transform: translate(0,0) scale(1); opacity: 0.2; }
            100% { transform: translate(70px, -60px) scale(1.3); opacity: 0.5; }
        }
        .login-card {
            position: relative;
            z-index: 10;
            width: 380px;
            background: rgba(8, 6, 18, 0.7);
            backdrop-filter: blur(24px);
            border-radius: 48px;
            border: 1px solid rgba(140, 100, 220, 0.35);
            padding: 44px 36px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(140,100,220,0.1);
            transition: all 0.3s ease;
        }
        .login-card h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #e0ccff, #b07eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        .login-card p {
            color: #8a7bb5;
            margin-bottom: 32px;
            font-size: 13px;
            font-weight: 400;
        }
        .login-card input {
            width: 100%;
            background: rgba(13, 10, 26, 0.8);
            border: 1px solid #2a2350;
            border-radius: 40px;
            padding: 14px 20px;
            margin-bottom: 18px;
            color: #f0eaff;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        .login-card input:focus {
            border-color: #9a6eff;
            box-shadow: 0 0 12px rgba(154,110,255,0.2);
        }
        .login-card button {
            width: 100%;
            background: linear-gradient(90deg, #7a44dd, #b27aff);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .login-card button:active {
            transform: scale(0.97);
        }
        .error {
            color: #ff8a9f;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
        }
        .main-panel {
            display: none;
            position: relative;
            z-index: 10;
            width: 880px;
            max-width: 95%;
            background: rgba(8, 6, 18, 0.6);
            backdrop-filter: blur(28px);
            border-radius: 52px;
            border: 1px solid rgba(140, 100, 220, 0.3);
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(140,100,220,0.1);
            animation: slideUp 0.6s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .panel-header {
            padding: 28px 36px 0 36px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid rgba(140,100,220,0.2);
            padding-bottom: 18px;
        }
        .panel-header h2 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #c69eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .version-tag {
            background: rgba(60, 40, 110, 0.5);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 10px;
            color: #cbb5ff;
            font-weight: 500;
        }
        .tabs-row {
            display: flex;
            gap: 10px;
            padding: 22px 36px 0 36px;
        }
        .tab-btn {
            background: rgba(30, 22, 55, 0.5);
            border: none;
            padding: 9px 26px;
            border-radius: 40px;
            font-weight: 500;
            color: #b5a6e0;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            backdrop-filter: blur(4px);
        }
        .tab-btn.active {
            background: linear-gradient(120deg, #6a38d0, #9a5eff);
            color: white;
            box-shadow: 0 4px 14px rgba(106,56,208,0.3);
        }
        .tab-pane {
            display: none;
            padding: 28px 36px 36px 36px;
            animation: fadePane 0.3s ease;
        }
        .tab-pane.active {
            display: block;
        }
        @keyframes fadePane {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glass-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 36px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(140,100,220,0.2);
            backdrop-filter: blur(4px);
        }
        .stats-row {
            display: flex;
            gap: 18px;
            margin-bottom: 24px;
        }
        .stat-box {
            background: rgba(10, 7, 22, 0.7);
            border-radius: 32px;
            padding: 22px 16px;
            flex: 1;
            text-align: center;
            border: 1px solid rgba(140,100,220,0.2);
            transition: transform 0.2s;
        }
        .stat-box:hover {
            transform: translateY(-2px);
            border-color: rgba(140,100,220,0.4);
        }
        .stat-number {
            font-size: 38px;
            font-weight: 700;
            color: #e5ccff;
            letter-spacing: -0.5px;
        }
        .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #8a7bb0;
            margin-top: 8px;
            font-weight: 500;
        }
        input, select {
            background: rgba(12, 9, 24, 0.8);
            border: 1px solid #2f2855;
            border-radius: 32px;
            padding: 12px 18px;
            width: 100%;
            color: #f2eaff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            border-color: #9a6eff;
            box-shadow: 0 0 10px rgba(154,110,255,0.15);
        }
        .double {
            display: flex;
            gap: 16px;
        }
        .btn {
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.1s ease;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-exec {
            background: linear-gradient(90deg, #8b48e0, #c282ff);
            color: white;
        }
        .btn-stop {
            background: rgba(120, 40, 80, 0.8);
            color: #ffccee;
            border: 1px solid rgba(255,100,150,0.3);
        }
        .logs-window {
            background: rgba(2, 1, 8, 0.7);
            border-radius: 32px;
            padding: 18px;
            height: 270px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 11px;
            color: #b0f0b0;
            border: 1px solid rgba(140,100,220,0.2);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(25, 20, 45, 0.9);
            backdrop-filter: blur(24px);
            border-left: 4px solid #b27aff;
            padding: 14px 28px;
            border-radius: 60px;
            color: #f0eaff;
            font-size: 13px;
            z-index: 999;
            transform: translateX(500px);
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            font-weight: 500;
        }
        .toast.show {
            transform: translateX(0);
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1530;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #7a55cc;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="orb"></div>
<div class="orb2"></div>

<div id="loginView" class="login-card">
    <h1>UDP FLOOD/SYN</h1>
    <p>Napierdala Pakiety Jak Rozrzutnik Gnoju</p>
    <input type="text" id="loginUser" placeholder="nazwa użytkownika">
    <input type="password" id="loginPass" placeholder="hasło">
    <button id="doLogin">Loguj Sie</button>
    <div id="loginMsg" class="error"></div>
</div>

<div id="appPanel" class="main-panel">
    <div class="panel-header">
        <h2>SILK <span style="color:#bd7eff">SYN</span></h2>
        <div class="version-tag">v8.0 // RAW ENGINE</div>
    </div>
    <div class="tabs-row">
        <button class="tab-btn active" data-tab="tabDash">Główny Panel</button>
        <button class="tab-btn" data-tab="tabAttack">Wyjeb Bombe</button>
        <button class="tab-btn" data-tab="tabLogs">Logi</button>
    </div>

    <div id="tabDash" class="tab-pane active">
        <div class="stats-row">
            <div class="stat-box"><div class="stat-number" id="statPacketsDash">0</div><div class="label">PACKETS SENT</div></div>
            <div class="stat-box"><div class="stat-number" id="statStatusDash">IDLE</div><div class="label">STATUS</div></div>
            <div class="stat-box"><div class="stat-number" id="statPpsDash">0</div><div class="label">PPS (AVG)</div></div>
        </div>
        <div class="glass-card">
            <div style="font-weight:600; margin-bottom:12px; color:#ccb5ff;">CURRENT TARGET</div>
            <div id="dashTargetInfo" style="font-size:18px; font-weight:500;">—</div>
            <div style="margin-top:12px; font-size:12px; color:#aa99dd;" id="dashMethodInfo"></div>
        </div>
    </div>

    <div id="tabAttack" class="tab-pane">
        <div class="glass-card">
            <div style="margin-bottom: 20px;">
                <label style="display:block; margin-bottom:8px; font-size:12px; color:#bbaaee;">TARGET (IP / DOMAIN)</label>
                <input type="text" id="attackTarget" placeholder="example.com | 192.168.1.1">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; margin-bottom:8px; font-size:12px; color:#bbaaee;">METHOD</label>
                <select id="attackMethod">
                    <option value="HTTP FLOOD">HTTP FLOOD (L7)</option>
                    <option value="UDP FLOOD">UDP FLOOD (L4)</option>
                    <option value="SYN FLOOD">SYN FLOOD + SPOOF</option>
                    <option value="ICMP STORM">ICMP STORM</option>
                </select>
            </div>
            <div class="double">
                <div style="flex:1"><label style="display:block; margin-bottom:8px; font-size:12px; color:#bbaaee;">THREADS</label><input type="number" id="attackThreads" value="75" min="1"></div>
                <div style="flex:1"><label style="display:block; margin-bottom:8px; font-size:12px; color:#bbaaee;">SPOOF IP</label><select id="attackSpoof"><option value="true">ON</option><option value="false">OFF</option></select></div>
            </div>
            <div style="margin: 20px 0;">
                <label style="display:block; margin-bottom:8px; font-size:12px; color:#bbaaee;">DURATION (seconds, 0 = infinite)</label>
                <input type="number" id="attackDuration" value="35" min="0">
            </div>
            <div style="display: flex; gap: 16px; margin-top: 10px;">
                <button class="btn btn-exec" id="executeBtn">EXECUTE ATTACK</button>
                <button class="btn btn-stop" id="terminateBtn">TERMINATE</button>
            </div>
        </div>
    </div>

    <div id="tabLogs" class="tab-pane">
        <div class="logs-window" id="logsContainer">
            <div>[system] Silk SYN v8.0 online</div>
            <div>[system] DDoS engine ready</div>
        </div>
    </div>
</div>

<div id="toastMessage" class="toast">ready</div>

<script>
    function toast(msg, isError) {
        var t = document.getElementById('toastMessage');
        t.textContent = msg;
        if (isError) { t.style.borderLeftColor = '#ff667a'; } else { t.style.borderLeftColor = '#b27aff'; }
        t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 2600);
    }

    document.getElementById('doLogin').onclick = function() {
        var u = document.getElementById('loginUser').value;
        var p = document.getElementById('loginPass').value;
        if (u === "Silos" && p === "Licka") {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('appPanel').style.display = 'block';
            toast("Access Dokonany. Silk SYN ready", false);
        } else {
            document.getElementById('loginMsg').innerText = "Nieprawidłowe dane";
            toast("Login failed", true);
        }
    };

    var tabsBtns = document.querySelectorAll('.tab-btn');
    var panes = document.querySelectorAll('.tab-pane');
    for (var i = 0; i < tabsBtns.length; i++) {
        tabsBtns[i].addEventListener('click', function() {
            var id = this.getAttribute('data-tab');
            for (var j = 0; j < tabsBtns.length; j++) {
                tabsBtns[j].classList.remove('active');
            }
            this.classList.add('active');
            for (var k = 0; k < panes.length; k++) {
                panes[k].classList.remove('active');
            }
            document.getElementById(id).classList.add('active');
        });
    }

    var attackActive = false;
    var attackInterval = null;
    var stopTimer = null;
    var packetTotal = 0;
    var currentPps = 0;
    var currentTargetText = "";
    var currentMethodText = "";

    var logsDiv = document.getElementById('logsContainer');
    var statPacketsSpan = document.getElementById('statPacketsDash');
    var statStatusSpan = document.getElementById('statStatusDash');
    var statPpsSpan = document.getElementById('statPpsDash');
    var dashTargetSpan = document.getElementById('dashTargetInfo');
    var dashMethodSpan = document.getElementById('dashMethodInfo');

    function addLog(msg, isErr) {
        var line = document.createElement('div');
        var now = new Date();
        var time = now.getHours() + ":" + now.getMinutes() + ":" + now.getSeconds();
        line.textContent = "[" + time + "] " + msg;
        if (isErr) line.style.color = "#ffa5bb";
        logsDiv.appendChild(line);
        line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        if (!isErr) toast(msg.substring(0, 55), false);
    }

    function updateUI() {
        statPacketsSpan.innerText = packetTotal;
        statStatusSpan.innerText = attackActive ? "ATTACKING" : "IDLE";
        statPpsSpan.innerText = currentPps;
        dashTargetSpan.innerText = currentTargetText || "—";
        dashMethodSpan.innerText = currentMethodText ? "Method: " + currentMethodText : "";
    }

    function stopAttack() {
        if (attackInterval) { clearInterval(attackInterval); attackInterval = null; }
        if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
        attackActive = false;
        currentPps = 0;
        updateUI();
        addLog("Attack terminated", true);
        toast("Attack stopped", true);
    }

    function startAttack() {
        if (attackActive) { toast("Attack already running", true); return; }
        var target = document.getElementById('attackTarget').value.trim();
        if (!target) { toast("Enter target", true); return; }
        var method = document.getElementById('attackMethod').value;
        var threads = parseInt(document.getElementById('attackThreads').value);
        if (isNaN(threads) || threads < 1) threads = 50;
        var spoof = document.getElementById('attackSpoof').value === "true";
        var duration = parseInt(document.getElementById('attackDuration').value);
        if (isNaN(duration)) duration = 30;

        currentTargetText = target;
        currentMethodText = method;
        addLog("[LAUNCH] Target: " + target + " | " + method + " | Thr:" + threads + " | Spoof:" + (spoof ? "ON" : "OFF") + " | Dur:" + duration + "s", false);
        attackActive = true;
        packetTotal = 0;
        updateUI();

        var localPkt = 0;
        attackInterval = setInterval(function() {
            if (!attackActive) { clearInterval(attackInterval); attackInterval = null; return; }
            var batch = threads;
            if (batch > 24) batch = 24;
            for (var i = 0; i < batch; i++) {
                localPkt++;
                packetTotal++;
                var spoofPart = "";
                if (spoof) {
                    spoofPart = " (spoof: " + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + ")";
                }
                if (method === "HTTP FLOOD") addLog("[HTTP] GET /" + Math.random().toString(36).substring(5) + " -> " + target + spoofPart, false);
                else if (method === "UDP FLOOD") addLog("[UDP] " + target + ":" + Math.floor(Math.random()*60000) + " | len " + (Math.floor(Math.random()*900)+100) + spoofPart, false);
                else if (method === "SYN FLOOD") addLog("[SYN] seq=" + Math.floor(Math.random()*9999999) + " window=65535 -> " + target + spoofPart, false);
                else addLog("[ICMP] echo request id=" + Math.floor(Math.random()*65535) + " -> " + target + spoofPart, false);
            }
            currentPps = Math.floor(batch * 4.2);
            updateUI();
        }, 200);

        if (duration > 0) {
            stopTimer = setTimeout(function() {
                if (attackActive) {
                    stopAttack();
                    addLog("Attack finished (" + duration + "s)", false);
                }
            }, duration * 1000);
        }
    }

    document.getElementById('executeBtn').addEventListener('click', startAttack);
    document.getElementById('terminateBtn').addEventListener('click', stopAttack);

    setInterval(function() { if(attackActive) updateUI(); }, 300);
</script>
</body>
</html>
