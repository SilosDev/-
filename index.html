<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <title>SILOS STRIKE | DDoS Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            background: #000000;
            min-height: 100vh;
        }
        body {
            background: radial-gradient(circle at 30% 10%, #0a0718, #010001);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .orb {
            position: fixed;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(120, 60, 220, 0.2), transparent);
            border-radius: 50%;
            top: -20%;
            right: -20%;
            z-index: 0;
            animation: floatGlow 16s infinite alternate;
        }
        @keyframes floatGlow {
            0% { transform: translate(0,0) scale(1); opacity: 0.4; }
            100% { transform: translate(-80px, 100px) scale(1.3); opacity: 0.7; }
        }
        .login-card {
            position: relative;
            z-index: 10;
            width: 380px;
            background: rgba(10, 8, 20, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            border: 1px solid rgba(170, 120, 255, 0.4);
            padding: 44px 36px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
            transition: 0.2s;
        }
        .login-card h1 {
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, #e2c6ff, #aa6eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .login-card p {
            color: #9a8ec2;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .login-card input {
            width: 100%;
            background: #0d0b1a;
            border: 1px solid #2e2850;
            border-radius: 44px;
            padding: 14px 20px;
            margin-bottom: 18px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .login-card button {
            width: 100%;
            background: linear-gradient(90deg, #884dff, #c46eff);
            border: none;
            padding: 14px;
            border-radius: 44px;
            font-weight: bold;
            font-size: 18px;
            color: white;
            cursor: pointer;
        }
        .error {
            color: #ff8a9f;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
        }
        .main-panel {
            display: none;
            position: relative;
            z-index: 10;
            width: 800px;
            max-width: 95%;
            background: rgba(12, 9, 24, 0.7);
            backdrop-filter: blur(24px);
            border-radius: 56px;
            border: 1px solid rgba(160, 110, 255, 0.35);
            overflow: hidden;
            box-shadow: 0 25px 45px black;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .panel-header {
            padding: 26px 32px 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .panel-header h2 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, white, #c68eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .version-tag {
            background: #2a1f4a;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 11px;
            color: #dbbaff;
        }
        .tabs-row {
            display: flex;
            gap: 12px;
            padding: 24px 32px 0 32px;
        }
        .tab-btn {
            background: rgba(30, 22, 55, 0.6);
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            color: #bcb0e6;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .tab-btn.active {
            background: #7b40e0;
            color: white;
            box-shadow: 0 0 12px #a56eff;
        }
        .tab-pane {
            display: none;
            padding: 28px 32px 36px 32px;
            animation: fadePane 0.25s ease;
        }
        .tab-pane.active {
            display: block;
        }
        @keyframes fadePane {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glass-card {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 40px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stats-row {
            display: flex;
            gap: 18px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #0a071a;
            border-radius: 32px;
            padding: 20px;
            flex: 1;
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: #e2b6ff;
        }
        .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #aaa;
            margin-top: 6px;
        }
        input, select {
            background: #0c0820;
            border: 1px solid #37305a;
            border-radius: 34px;
            padding: 12px 18px;
            width: 100%;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .double {
            display: flex;
            gap: 16px;
        }
        .btn {
            border: none;
            padding: 12px 24px;
            border-radius: 44px;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
        }
        .btn-exec {
            background: linear-gradient(90deg, #9a40ff, #cd72ff);
            color: white;
        }
        .btn-stop {
            background: #9e2e4e;
            color: white;
        }
        .logs-window {
            background: #03010e;
            border-radius: 32px;
            padding: 18px;
            height: 260px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #b5f0b5;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1f1a32;
            backdrop-filter: blur(20px);
            border-left: 5px solid #c56eff;
            padding: 14px 28px;
            border-radius: 60px;
            color: white;
            font-size: 14px;
            z-index: 999;
            transform: translateX(450px);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 4px 20px black;
        }
        .toast.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>
<div class="orb"></div>

<div id="loginView" class="login-card">
    <h1>SILOS STRIKE</h1>
    <p>ddos panel // core access</p>
    <input type="text" id="loginUser" placeholder="nazwa użytkownika">
    <input type="password" id="loginPass" placeholder="hasło">
    <button id="doLogin">ZALOGUJ</button>
    <div id="loginMsg" class="error"></div>
</div>

<div id="appPanel" class="main-panel">
    <div class="panel-header">
        <h2>SILOS <span style="color:#bd7eff">STRIKE</span></h2>
        <div class="version-tag">v7.2 // NEXTGEN</div>
    </div>
    <div class="tabs-row">
        <button class="tab-btn active" data-tab="tabDash">DASHBOARD</button>
        <button class="tab-btn" data-tab="tabAttack">EXECUTE ATTACK</button>
        <button class="tab-btn" data-tab="tabLogs">LIVE LOGS</button>
    </div>

    <div id="tabDash" class="tab-pane active">
        <div class="stats-row">
            <div class="stat-box"><div class="stat-number" id="statPacketsDash">0</div><div class="label">PACKETS SENT</div></div>
            <div class="stat-box"><div class="stat-number" id="statStatusDash">IDLE</div><div class="label">STATUS</div></div>
            <div class="stat-box"><div class="stat-number" id="statPpsDash">0</div><div class="label">PPS (AVG)</div></div>
        </div>
        <div class="glass-card">
            <div style="font-weight:bold; margin-bottom:12px;">CURRENT TARGET</div>
            <div id="dashTargetInfo">—</div>
            <div style="margin-top:12px; font-size:12px; color:#aa9eff;" id="dashMethodInfo"></div>
        </div>
    </div>

    <div id="tabAttack" class="tab-pane">
        <div class="glass-card">
            <div style="margin-bottom: 20px;">
                <label style="display:block; margin-bottom:6px;">TARGET (IP / DOMAIN)</label>
                <input type="text" id="attackTarget" placeholder="example.com | 192.168.1.1">
            </div>
            <div style="margin-bottom: 20px;">
                <label>METHOD</label>
                <select id="attackMethod">
                    <option value="HTTP FLOOD">HTTP FLOOD (L7)</option>
                    <option value="UDP FLOOD">UDP FLOOD (L4)</option>
                    <option value="SYN FLOOD">SYN FLOOD + SPOOF</option>
                    <option value="ICMP STORM">ICMP STORM</option>
                </select>
            </div>
            <div class="double">
                <div style="flex:1"><label>THREADS</label><input type="number" id="attackThreads" value="75" min="1"></div>
                <div style="flex:1"><label>SPOOF IP</label><select id="attackSpoof"><option value="true">ON</option><option value="false">OFF</option></select></div>
            </div>
            <div style="margin: 20px 0;">
                <label>DURATION (seconds, 0 = infinite)</label>
                <input type="number" id="attackDuration" value="35" min="0">
            </div>
            <div style="display: flex; gap: 16px; margin-top: 10px;">
                <button class="btn btn-exec" id="executeBtn">EXECUTE ATTACK</button>
                <button class="btn btn-stop" id="terminateBtn">TERMINATE</button>
            </div>
        </div>
    </div>

    <div id="tabLogs" class="tab-pane">
        <div class="logs-window" id="logsContainer">
            <div>[system] SILOS STRIKE v7.2 online</div>
            <div>[system] DDoS engine ready</div>
        </div>
    </div>
</div>

<div id="toastMessage" class="toast">ready</div>

<script>
    function toast(msg, isError) {
        var t = document.getElementById('toastMessage');
        t.textContent = msg;
        if (isError) { t.style.borderLeftColor = '#ff667a'; } else { t.style.borderLeftColor = '#c56eff'; }
        t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 2600);
    }

    document.getElementById('doLogin').onclick = function() {
        var u = document.getElementById('loginUser').value;
        var p = document.getElementById('loginPass').value;
        if (u === "Silos" && p === "Licka") {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('appPanel').style.display = 'block';
            toast("Access granted. SILOS STRIKE ready", false);
        } else {
            document.getElementById('loginMsg').innerText = "Nieprawidłowe dane";
            toast("Login failed", true);
        }
    };

    var tabsBtns = document.querySelectorAll('.tab-btn');
    var panes = document.querySelectorAll('.tab-pane');
    for (var i = 0; i < tabsBtns.length; i++) {
        tabsBtns[i].addEventListener('click', function() {
            var id = this.getAttribute('data-tab');
            for (var j = 0; j < tabsBtns.length; j++) {
                tabsBtns[j].classList.remove('active');
            }
            this.classList.add('active');
            for (var k = 0; k < panes.length; k++) {
                panes[k].classList.remove('active');
            }
            document.getElementById(id).classList.add('active');
        });
    }

    var attackActive = false;
    var attackInterval = null;
    var stopTimer = null;
    var packetTotal = 0;
    var currentPps = 0;
    var currentTargetText = "";
    var currentMethodText = "";

    var logsDiv = document.getElementById('logsContainer');
    var statPacketsSpan = document.getElementById('statPacketsDash');
    var statStatusSpan = document.getElementById('statStatusDash');
    var statPpsSpan = document.getElementById('statPpsDash');
    var dashTargetSpan = document.getElementById('dashTargetInfo');
    var dashMethodSpan = document.getElementById('dashMethodInfo');

    function addLog(msg, isErr) {
        var line = document.createElement('div');
        var now = new Date();
        var time = now.getHours() + ":" + now.getMinutes() + ":" + now.getSeconds();
        line.textContent = "[" + time + "] " + msg;
        if (isErr) line.style.color = "#ffa5bb";
        logsDiv.appendChild(line);
        line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        if (!isErr) toast(msg.substring(0, 55), false);
    }

    function updateUI() {
        statPacketsSpan.innerText = packetTotal;
        statStatusSpan.innerText = attackActive ? "ATTACKING" : "IDLE";
        statPpsSpan.innerText = currentPps;
        dashTargetSpan.innerText = currentTargetText || "—";
        dashMethodSpan.innerText = currentMethodText ? "Method: " + currentMethodText : "";
    }

    function stopAttack() {
        if (attackInterval) { clearInterval(attackInterval); attackInterval = null; }
        if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
        attackActive = false;
        currentPps = 0;
        updateUI();
        addLog("Attack terminated", true);
        toast("Attack stopped", true);
    }

    function startAttack() {
        if (attackActive) { toast("Attack already running", true); return; }
        var target = document.getElementById('attackTarget').value.trim();
        if (!target) { toast("Enter target", true); return; }
        var method = document.getElementById('attackMethod').value;
        var threads = parseInt(document.getElementById('attackThreads').value);
        if (isNaN(threads) || threads < 1) threads = 50;
        var spoof = document.getElementById('attackSpoof').value === "true";
        var duration = parseInt(document.getElementById('attackDuration').value);
        if (isNaN(duration)) duration = 30;

        currentTargetText = target;
        currentMethodText = method;
        addLog("[LAUNCH] Target: " + target + " | " + method + " | Thr:" + threads + " | Spoof:" + (spoof ? "ON" : "OFF") + " | Dur:" + duration + "s", false);
        attackActive = true;
        packetTotal = 0;
        updateUI();

        var localPkt = 0;
        attackInterval = setInterval(function() {
            if (!attackActive) { clearInterval(attackInterval); attackInterval = null; return; }
            var batch = threads;
            if (batch > 24) batch = 24;
            for (var i = 0; i < batch; i++) {
                localPkt++;
                packetTotal++;
                var spoofPart = "";
                if (spoof) {
                    spoofPart = " (spoof: " + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + ")";
                }
                if (method === "HTTP FLOOD") addLog("[HTTP] GET /" + Math.random().toString(36).substring(5) + " -> " + target + spoofPart, false);
                else if (method === "UDP FLOOD") addLog("[UDP] " + target + ":" + Math.floor(Math.random()*60000) + " | len " + (Math.floor(Math.random()*900)+100) + spoofPart, false);
                else if (method === "SYN FLOOD") addLog("[SYN] seq=" + Math.floor(Math.random()*9999999) + " window=65535 -> " + target + spoofPart, false);
                else addLog("[ICMP] echo request id=" + Math.floor(Math.random()*65535) + " -> " + target + spoofPart, false);
            }
            currentPps = Math.floor(batch * 4.2);
            updateUI();
        }, 200);

        if (duration > 0) {
            stopTimer = setTimeout(function() {
                if (attackActive) {
                    stopAttack();
                    addLog("Attack finished (" + duration + "s)", false);
                }
            }, duration * 1000);
        }
    }

    document.getElementById('executeBtn').addEventListener('click', startAttack);
    document.getElementById('terminateBtn').addEventListener('click', stopAttack);

    setInterval(function() { if(attackActive) updateUI(); }, 300);
</script>
</body>
</html>
