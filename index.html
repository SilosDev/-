<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <title>SILK BY ?? | Panel</title>
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js" type="module"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }
        body {
            background: radial-gradient(circle at 30% 10%, #0a0518, #000000);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(100, 80, 200, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100, 80, 200, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }
        .lottie-center {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            z-index: 0;
            opacity: 0.2;
            pointer-events: none;
        }
        .crosshair {
            position: fixed;
            width: 28px;
            height: 28px;
            border: 2px solid #ff44cc;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #ff44cc;
        }
        .login-box {
            position: relative;
            z-index: 10;
            width: 380px;
            background: rgba(8, 5, 20, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(200, 100, 255, 0.4);
            padding: 48px 36px;
            text-align: center;
        }
        .login-box h1 {
            font-size: 40px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #dd88ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        .login-box p {
            color: #aa99dd;
            margin-bottom: 32px;
        }
        .login-box input {
            width: 100%;
            background: rgba(0,0,0,0.6);
            border: 1px solid #5533aa;
            border-radius: 60px;
            padding: 14px 20px;
            margin-bottom: 16px;
            color: white;
            font-size: 15px;
        }
        .login-box input:focus {
            border-color: #ff66ee;
            outline: none;
        }
        .login-box button {
            width: 100%;
            background: linear-gradient(90deg, #aa44ff, #ff44cc);
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            color: white;
            cursor: crosshair;
        }
        .main-panel {
            display: none;
            position: relative;
            z-index: 10;
            width: 1200px;
            max-width: 98%;
            background: rgba(6, 4, 18, 0.65);
            backdrop-filter: blur(24px);
            border-radius: 56px;
            border: 1px solid rgba(180, 100, 255, 0.35);
            overflow: hidden;
        }
        .header {
            padding: 28px 36px;
            border-bottom: 1px solid rgba(200,100,255,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ff88ee);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .version {
            background: #2a1a4a;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 11px;
            color: #ffccff;
        }
        .tabs {
            display: flex;
            gap: 10px;
            padding: 0 36px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .tab {
            background: rgba(30, 20, 50, 0.6);
            padding: 10px 26px;
            border-radius: 40px;
            color: #ccaaee;
            cursor: crosshair;
            font-weight: 600;
            transition: 0.2s;
        }
        .tab.active {
            background: linear-gradient(120deg, #aa44ff, #ff44cc);
            color: white;
            box-shadow: 0 0 12px rgba(170,68,255,0.5);
        }
        .pane {
            display: none;
            padding: 32px 36px;
            animation: fadeIn 0.25s ease;
        }
        .pane.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stats {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(0,0,0,0.45);
            border-radius: 32px;
            padding: 24px;
            flex: 1;
            text-align: center;
            border: 1px solid rgba(200,100,255,0.2);
        }
        .stat-number {
            font-size: 44px;
            font-weight: 800;
            color: #ffccff;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #bbaaee;
            font-size: 12px;
        }
        input, select {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid #5533aa;
            border-radius: 32px;
            padding: 12px 18px;
            color: white;
        }
        .row-2, .row-3, .row-4 {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }
        .row-2 > *, .row-3 > *, .row-4 > * { flex: 1; }
        button {
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: crosshair;
        }
        .btn-primary {
            background: linear-gradient(90deg, #aa44ff, #ff44cc);
            color: white;
        }
        .btn-danger {
            background: #882244;
            color: white;
        }
        .btn-spoof {
            background: linear-gradient(90deg, #44aaff, #44ffcc);
            color: black;
        }
        .logs-box {
            background: rgba(0,0,0,0.6);
            border-radius: 32px;
            padding: 20px;
            height: 280px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #aaffdd;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a0f2a;
            backdrop-filter: blur(16px);
            border-left: 4px solid #ff44cc;
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            z-index: 1000;
            transform: translateX(450px);
            transition: 0.3s;
        }
        .toast.show { transform: translateX(0); }
        .result-box {
            background: #0a0520;
            border-radius: 28px;
            padding: 16px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            color: #44ffaa;
        }
        .validation-badge {
            background: #1a0f2a;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            display: inline-block;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="lottie-center" id="lottieMain"></div>
<div class="crosshair" id="crosshairDot"></div>

<div id="loginScreen" class="login-box">
    <h1>SILK BY ??</h1>
    <p>next generation panel</p>
    <input type="text" id="loginUser" placeholder="username">
    <input type="password" id="loginPass" placeholder="password">
    <button id="loginBtn">Access</button>
    <div id="loginMsg" style="color:#ff6688; margin-top:16px;"></div>
</div>

<div id="appScreen" class="main-panel">
    <div class="header">
        <h2>SILK <span style="color:#ff66ee">BY ??</span></h2>
        <div class="version">v13.0</div>
    </div>
    <div class="tabs">
        <div class="tab active" data-tab="dash">Dashboard</div>
        <div class="tab" data-tab="ddos">DDoS Inject</div>
        <div class="tab" data-tab="spoofer">Vinted Spoofer</div>
        <div class="tab" data-tab="logs">Logs</div>
    </div>

    <div id="dash" class="pane active">
        <div class="stats">
            <div class="stat-card"><div class="stat-number" id="dashPackets">0</div><div>Packets</div></div>
            <div class="stat-card"><div class="stat-number" id="dashStatus">Idle</div><div>Status</div></div>
            <div class="stat-card"><div class="stat-number" id="dashPps">0</div><div>PPS</div></div>
        </div>
        <div class="stat-card" style="text-align:left;">
            <div style="color:#ccb5ff; margin-bottom:8px;">Current Target</div>
            <div id="dashTarget" style="font-size:18px;">—</div>
            <div id="dashValid" class="validation-badge"></div>
        </div>
    </div>

    <div id="ddos" class="pane">
        <div class="row-3">
            <div class="form-group"><label>Target (IP / Domain)</label><input type="text" id="ddosTarget" placeholder="example.com / 1.2.3.4"></div>
            <div class="form-group"><label>Method</label><select id="ddosMethod"><option>HTTP Flood</option><option>UDP Flood</option><option>SYN Flood</option><option>ICMP Storm</option><option>TCP RST</option></select></div>
            <div class="form-group"><label>Port</label><input type="number" id="ddosPort" value="80"></div>
        </div>
        <div class="row-4">
            <div class="form-group"><label>Threads</label><input type="number" id="ddosThreads" value="80"></div>
            <div class="form-group"><label>Packet Size</label><input type="number" id="ddosSize" value="512"></div>
            <div class="form-group"><label>Delay (ms)</label><input type="number" id="ddosDelay" value="0"></div>
            <div class="form-group"><label>Spoof IP</label><select id="ddosSpoof"><option>OFF</option><option>ON</option></select></div>
        </div>
        <div class="row-2">
            <div class="form-group"><label>Duration (sec)</label><input type="number" id="ddosDuration" value="30"></div>
            <div class="form-group"><label>Random Payload</label><select id="ddosRandom"><option>OFF</option><option>ON</option></select></div>
        </div>
        <div id="targetValidMsg" class="validation-badge" style="margin-bottom:16px;"></div>
        <div style="display:flex; gap:16px;">
            <button class="btn-primary" id="injectBtn">Inject Process</button>
            <button class="btn-danger" id="stopBtn">Terminate</button>
        </div>
    </div>

    <div id="spoofer" class="pane">
        <div class="row-4">
            <button class="btn-spoof" id="spoofHwid">HWID Spoof</button>
            <button class="btn-spoof" id="spoofMac">MAC Spoof</button>
            <button class="btn-spoof" id="spoofIp">IP Spoof</button>
            <button class="btn-spoof" id="spoofDevice">Device Spoof</button>
        </div>
        <button class="btn-primary" id="spoofFull" style="width:100%; margin-top:8px;">Full Mask Spoof</button>
        <div id="spoofResult" class="result-box">[ready]</div>
    </div>

    <div id="logs" class="pane">
        <div class="logs-box" id="logsContainer">
            <div>[system] SILK BY ?? v13.0 online</div>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast">ready</div>

<script>
    const lottieContainer = document.getElementById('lottieMain');
    if (lottieContainer) {
        const lottieEl = document.createElement('dotlottie-wc');
        lottieEl.setAttribute('src', 'https://lottie.host/33ee256d-6df6-4829-9568-ff066f9c3de5/MsowL0wALe.lottie');
        lottieEl.style.width = '100%';
        lottieEl.style.height = '100%';
        lottieEl.setAttribute('autoplay', '');
        lottieEl.setAttribute('loop', '');
        lottieContainer.appendChild(lottieEl);
    }

    const crosshair = document.getElementById('crosshairDot');
    document.addEventListener('mousemove', (e) => {
        crosshair.style.left = e.clientX + 'px';
        crosshair.style.top = e.clientY + 'px';
    });

    function toast(msg, isErr) {
        const t = document.getElementById('toastMsg');
        t.textContent = msg;
        t.style.borderLeftColor = isErr ? '#ff667a' : '#ff44cc';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    document.getElementById('loginBtn').onclick = () => {
        const u = document.getElementById('loginUser').value;
        const p = document.getElementById('loginPass').value;
        if (u === 'Silos' && p === 'Licka') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
            toast('Access granted', false);
        } else {
            document.getElementById('loginMsg').innerText = 'Invalid credentials';
            toast('Login failed', true);
        }
    };

    const tabs = document.querySelectorAll('.tab');
    const panes = document.querySelectorAll('.pane');
    tabs.forEach(t => {
        t.addEventListener('click', () => {
            const id = t.getAttribute('data-tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            t.classList.add('active');
            panes.forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        });
    });

    const blocked = ['youtube.com', 'youtu.be', 'facebook.com', 'instagram.com', 'tiktok.com', 'twitter.com', 'x.com', 'discord.com', 'google.com', 'twitch.tv', 'reddit.com', 'snapchat.com', 'telegram.org', 'whatsapp.com'];
    
    function isValidIp(ip) {
        const parts = ip.split('.');
        if (parts.length !== 4) return false;
        return parts.every(p => { const n = parseInt(p); return !isNaN(n) && n >= 0 && n <= 255; });
    }
    function isValidDomain(domain) {
        return /^[a-zA-Z0-9][a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/.test(domain);
    }
    function isBlocked(target) {
        return blocked.some(b => target.toLowerCase().includes(b));
    }
    function validateTarget(target) {
        if (!target) return { valid: false, reason: 'Empty target' };
        if (isBlocked(target)) return { valid: false, reason: 'Social media blocked' };
        if (isValidIp(target)) return { valid: true, reason: 'Valid IP' };
        if (isValidDomain(target)) return { valid: true, reason: 'Valid domain' };
        return { valid: false, reason: 'Invalid IP/domain' };
    }

    const targetInput = document.getElementById('ddosTarget');
    const validMsg = document.getElementById('targetValidMsg');
    const dashValid = document.getElementById('dashValid');

    function updateValidation() {
        const val = targetInput.value.trim();
        if (!val) { validMsg.innerHTML = ''; dashValid.innerHTML = ''; return; }
        const res = validateTarget(val);
        if (res.valid) {
            validMsg.innerHTML = '✓ ' + res.reason;
            validMsg.style.color = '#88ff88';
            dashValid.innerHTML = 'Target valid';
            dashValid.style.color = '#88ff88';
        } else {
            validMsg.innerHTML = '✗ ' + res.reason;
            validMsg.style.color = '#ff8888';
            dashValid.innerHTML = 'Invalid target';
            dashValid.style.color = '#ff8888';
        }
    }
    targetInput.addEventListener('input', updateValidation);

    let attackActive = false, attackInterval = null, stopTimer = null;
    let packetTotal = 0, currentPps = 0, currentTarget = '', currentMethod = '';
    const logsDiv = document.getElementById('logsContainer');
    const dashPackets = document.getElementById('dashPackets');
    const dashStatus = document.getElementById('dashStatus');
    const dashPps = document.getElementById('dashPps');
    const dashTargetSpan = document.getElementById('dashTarget');

    function addLog(msg, isErr) {
        const line = document.createElement('div');
        const d = new Date();
        line.textContent = `[${d.getHours()}:${d.getMinutes()}:${d.getSeconds()}] ${msg}`;
        if (isErr) line.style.color = '#ffa5bb';
        logsDiv.appendChild(line);
        line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        if (!isErr) toast(msg.slice(0, 50), false);
    }

    function updateUI() {
        dashPackets.innerText = packetTotal;
        dashStatus.innerText = attackActive ? 'ATTACKING' : 'IDLE';
        dashPps.innerText = currentPps;
        dashTargetSpan.innerText = currentTarget || '—';
    }

    function stopAttack() {
        if (attackInterval) clearInterval(attackInterval);
        if (stopTimer) clearTimeout(stopTimer);
        attackActive = false;
        currentPps = 0;
        updateUI();
        addLog('Attack terminated', true);
        toast('Attack stopped', true);
    }

    function startAttack() {
        if (attackActive) { toast('Already running', true); return; }
        const target = document.getElementById('ddosTarget').value.trim();
        if (!target) { toast('Enter target', true); return; }
        const validation = validateTarget(target);
        if (!validation.valid) { toast(validation.reason, true); addLog('ERROR: ' + validation.reason, true); return; }
        
        const method = document.getElementById('ddosMethod').value;
        const port = parseInt(document.getElementById('ddosPort').value) || 80;
        let threads = parseInt(document.getElementById('ddosThreads').value) || 50;
        threads = Math.min(threads, 30);
        const size = parseInt(document.getElementById('ddosSize').value) || 512;
        const delay = parseInt(document.getElementById('ddosDelay').value) || 0;
        const spoof = document.getElementById('ddosSpoof').value === 'ON';
        const duration = parseInt(document.getElementById('ddosDuration').value) || 30;
        const randomPayload = document.getElementById('ddosRandom').value === 'ON';

        currentTarget = `${target}:${port}`;
        currentMethod = method;
        addLog(`[INJECT] ${target}:${port} | ${method} | thr:${threads} | size:${size} | spoof:${spoof} | dur:${duration}s`, false);
        attackActive = true;
        packetTotal = 0;
        updateUI();

        attackInterval = setInterval(() => {
            if (!attackActive) { clearInterval(attackInterval); return; }
            for (let i = 0; i < threads; i++) {
                packetTotal++;
                const spoofPart = spoof ? ` (spoof: ${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)})` : '';
                const randPart = randomPayload ? ` | payload:${Math.random().toString(36).substring(4)}` : '';
                if (method === 'HTTP Flood') addLog(`[HTTP] GET /${Math.random().toString(36).substring(4)} -> ${target}:${port}${spoofPart}${randPart}`, false);
                else if (method === 'UDP Flood') addLog(`[UDP] ${target}:${port} | size:${size}${spoofPart}`, false);
                else if (method === 'SYN Flood') addLog(`[SYN] seq=${Math.floor(Math.random()*9999999)} -> ${target}:${port}${spoofPart}`, false);
                else if (method === 'ICMP Storm') addLog(`[ICMP] echo id=${Math.floor(Math.random()*65535)} -> ${target}${spoofPart}`, false);
                else addLog(`[TCP RST] flag=RST -> ${target}:${port}${spoofPart}`, false);
            }
            currentPps = Math.floor(threads * (1000 / (200 + delay)));
            updateUI();
        }, 200 + delay);

        if (duration > 0) stopTimer = setTimeout(() => { if (attackActive) { stopAttack(); addLog(`Attack finished (${duration}s)`, false); } }, duration * 1000);
    }

    document.getElementById('injectBtn').addEventListener('click', startAttack);
    document.getElementById('stopBtn').addEventListener('click', stopAttack);

    function randHWID() { return 'HWID-' + Math.random().toString(36).substring(2, 12).toUpperCase(); }
    function randMAC() { return [...Array(6)].map(() => Math.floor(Math.random()*256).toString(16).padStart(2,'0')).join(':').toUpperCase(); }
    function randIP() { return `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`; }
    function randDevice() { return ['iPhone15,2','SM-S918B','Pixel 8 Pro','Windows 11','MacBook M2','Linux x86_64'][Math.floor(Math.random()*6)]; }

    const spoofOut = document.getElementById('spoofResult');
    document.getElementById('spoofHwid').onclick = () => { const v = randHWID(); spoofOut.innerHTML = `[HWID] ${v}`; addLog(`HWID spoofed: ${v}`, false); toast(`HWID: ${v}`, false); };
    document.getElementById('spoofMac').onclick = () => { const v = randMAC(); spoofOut.innerHTML = `[MAC] ${v}`; addLog(`MAC spoofed: ${v}`, false); toast(`MAC: ${v}`, false); };
    document.getElementById('spoofIp').onclick = () => { const v = randIP(); spoofOut.innerHTML = `[IP] ${v}`; addLog(`IP spoofed: ${v}`, false); toast(`IP: ${v}`, false); };
    document.getElementById('spoofDevice').onclick = () => { const v = randDevice(); spoofOut.innerHTML = `[DEVICE] ${v}`; addLog(`Device spoofed: ${v}`, false); toast(`Device: ${v}`, false); };
    document.getElementById('spoofFull').onclick = () => { const h = randHWID(), m = randMAC(), i = randIP(), d = randDevice(); spoofOut.innerHTML = `[FULL] HWID: ${h} | MAC: ${m} | IP: ${i} | Device: ${d}`; addLog(`Full spoof: ${h} / ${m} / ${i} / ${d}`, false); toast('Full spoof applied', false); };

    setInterval(() => { if (attackActive) updateUI(); }, 300);
    updateValidation();
</script>
</body>
</html>
