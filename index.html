<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <title>SILOS STRIKE | DDoS Panel Next-Gen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #020108);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: repeating-linear-gradient(45deg, rgba(80, 60, 160, 0.02) 0px, rgba(80, 60, 160, 0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }

        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(120, 50, 220, 0.15), transparent 70%);
            border-radius: 50%;
            top: -200px;
            right: -200px;
            z-index: 0;
            animation: float 12s infinite alternate;
        }
        @keyframes float {
            0% { transform: translate(0,0) scale(1); opacity: 0.3; }
            100% { transform: translate(-60px, 80px) scale(1.3); opacity: 0.6; }
        }

        /* login - ten sam co wcześniej ale dostosowany */
        .login-box {
            position: relative;
            z-index: 10;
            width: 400px;
            background: rgba(15, 12, 25, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            border: 1px solid rgba(180, 130, 255, 0.4);
            padding: 40px 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }
        .login-box h2 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #d9b4ff, #9a4eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .login-box .sub {
            color: #aaa;
            margin-bottom: 32px;
        }
        .input-field {
            margin-bottom: 20px;
        }
        .input-field input {
            width: 100%;
            background: #0e0b1a;
            border: 1px solid #2f2a4a;
            border-radius: 32px;
            padding: 14px 20px;
            color: white;
        }
        .login-btn {
            background: linear-gradient(90deg, #7c3fd4, #b35eff);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            width: 100%;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        /* GŁÓWNY PANEL - nowoczesny z zakładkami */
        .ddos-panel {
            display: none;
            position: relative;
            z-index: 10;
            width: 750px;
            max-width: 95%;
            background: rgba(8, 6, 18, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(150, 100, 255, 0.3);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* nagłówek */
        .panel-header {
            padding: 24px 28px 0 28px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #c58eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .badge {
            background: #ff336633;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 11px;
            color: #ff99ff;
        }

        /* zakładki */
        .tabs {
            display: flex;
            gap: 8px;
            padding: 20px 28px 0 28px;
        }
        .tab {
            padding: 12px 28px;
            background: rgba(30, 20, 55, 0.6);
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #bbb;
            border: 1px solid transparent;
        }
        .tab.active {
            background: rgba(110, 60, 210, 0.8);
            color: white;
            box-shadow: 0 0 12px rgba(160, 100, 255, 0.4);
            border-color: #b77eff;
        }

        /* zawartość zakładek */
        .tab-content {
            display: none;
            padding: 28px;
            animation: fade 0.25s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* karty */
        .card {
            background: rgba(0,0,0,0.4);
            border-radius: 32px;
            padding: 22px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            font-size: 11px;
            text-transform: uppercase;
            color: #bfaaff;
        }
        input, select {
            background: #0c0920;
            border: 1px solid #343056;
            border-radius: 28px;
            padding: 12px 18px;
            width: 100%;
            color: white;
        }
        .row-2 {
            display: flex;
            gap: 16px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-primary {
            background: linear-gradient(90deg, #9b4dff, #d46eff);
            color: white;
        }
        .btn-danger {
            background: #aa2e4e;
            color: white;
        }
        .stats-grid {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat {
            background: #0f0c1c;
            border-radius: 28px;
            padding: 18px;
            text-align: center;
            flex: 1;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #dbbaff;
        }

        /* logi */
        .log-area {
            background: #05030f;
            border-radius: 28px;
            padding: 16px;
            height: 240px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
        }

        /* toasty */
        .toast-notify {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1f1a2f;
            backdrop-filter: blur(12px);
            border-left: 5px solid #b55aff;
            padding: 14px 24px;
            border-radius: 60px;
            color: white;
            font-size: 14px;
            z-index: 999;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px black;
        }
        .toast-notify.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>
<div class="bg-animation"></div>
<div class="glow"></div>

<div id="loginContainer" class="login-box">
    <h2>SILOS STRIKE</h2>
    <div class="sub">core access // ddos panel</div>
    <div class="input-field"><input type="text" id="loginUsername" placeholder="username"></div>
    <div class="input-field"><input type="password" id="loginPassword" placeholder="password"></div>
    <button class="login-btn" id="loginBtn">LOGIN</button>
    <div id="loginError" style="color:#ff8888; text-align:center; margin-top:16px;"></div>
</div>

<div id="ddosPanel" class="ddos-panel">
    <div class="panel-header">
        <div class="logo">SILOS<span style="color:#bf6eff"> STRIKE</span></div>
        <div class="badge">DDoS v7 // NEXTGEN</div>
    </div>
    <div class="tabs">
        <div class="tab active" data-tab="dashboard">DASHBOARD</div>
        <div class="tab" data-tab="attack">EXECUTE ATTACK</div>
        <div class="tab" data-tab="logs">LIVE LOGS</div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="tab-content active">
        <div class="stats-grid">
            <div class="stat"><div class="stat-value" id="statPackets">0</div><div>PKT SENT</div></div>
            <div class="stat"><div class="stat-value" id="statActive">IDLE</div><div>STATUS</div></div>
            <div class="stat"><div class="stat-value" id="statPps">0</div><div>PPS AVG</div></div>
        </div>
        <div class="card">
            <h3 style="margin-bottom: 12px;">⚡ Attack Info</h3>
            <div id="dashInfo">No active attack</div>
        </div>
    </div>

    <!-- ATTACK CONSOLE -->
    <div id="attack" class="tab-content">
        <div class="card">
            <div class="input-group"><label>TARGET IP / DOMAIN</label><input type="text" id="target" placeholder="example.com"></div>
            <div class="input-group"><label>METHOD</label><select id="attackType"><option value="http">HTTP FLOOD</option><option value="udp">UDP FLOOD</option><option value="syn">SYN FLOOD</option><option value="icmp">ICMP STORM</option></select></div>
            <div class="row-2">
                <div><label>THREADS</label><input type="number" id="threads" value="80"></div>
                <div><label>SPOOF</label><select id="spoof"><option value="true">ENABLED</option><option value="false">DISABLED</option></select></div>
            </div>
            <div class="input-group"><label>DURATION (sec, 0=inf)</label><input type="number" id="duration" value="30"></div>
            <div style="display: flex; gap: 16px; margin-top: 20px;">
                <button class="btn btn-primary" id="startBtn">🔥 EXECUTE ATTACK</button>
                <button class="btn btn-danger" id="stopBtn">⛔ TERMINATE</button>
            </div>
        </div>
    </div>

    <!-- LOGS -->
    <div id="logs" class="tab-content">
        <div class="log-area" id="logPanel">
            <div>[system] SILOS STRIKE v7 ready</div>
            <div>[system] DDoS engine online</div>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast-notify">✨ Ready</div>

<script>
    // toasty
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.borderLeftColor = isError ? '#ff4d6d' : '#b55aff';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // login
    document.getElementById('loginBtn').onclick = () => {
        const user = document.getElementById('loginUsername').value;
        const pass = document.getElementById('loginPassword').value;
        if (user === "Silos" && pass === "Licka") {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('ddosPanel').style.display = 'block';
            showToast("Access granted. SILOS STRIKE ready.");
        } else {
            document.getElementById('loginError').innerText = "Invalid credentials";
            showToast("Login failed", true);
        }
    };

    // zakładki
    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.getAttribute('data-tab');
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            contents.forEach(c => c.classList.remove('active'));
            document.getElementById(target).classList.add('active');
        });
    });

    // DDoS engine + statystyki
    let attackInterval = null, stopTimeout = null, active = false;
    let pktCount = 0, lastPps = 0;
    const logPanel = document.getElementById('logPanel');
    const statPackets = document.getElementById('statPackets');
    const statActive = document.getElementById('statActive');
    const statPps = document.getElementById('statPps');
    const dashInfo = document.getElementById('dashInfo');

    function addLog(msg, isErr = false) {
        const line = document.createElement('div');
        line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        if (isErr) line.style.color = "#ff99aa";
        logPanel.appendChild(line);
        line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        if (!isErr) showToast(msg.substring(0, 60));
    }

    function updateStats() {
        statPackets.innerText = pktCount;
        statPps.innerText = lastPps;
        statActive.innerText = active ? "ATTACKING" : "IDLE";
        dashInfo.innerText = active ? `🔥 Active: ${document.getElementById('target').value || 'target'} | ${document.getElementById('attackType').value}` : "No active attack";
    }

    function stopAttack() {
        if (attackInterval) clearInterval(attackInterval);
        if (stopTimeout) clearTimeout(stopTimeout);
        active = false;
        attackInterval = null;
        addLog("[ABORT] Attack terminated", true);
        updateStats();
        showToast("Attack stopped", true);
    }

    function startAttack() {
        if (active) { showToast("Attack already running", true); return; }
        const target = document.getElementById('target').value.trim();
        if (!target) { showToast("Target required", true); return; }
        const method = document.getElementById('attackType').value;
        let threads = parseInt(document.getElementById('threads').value) || 50;
        const spoof = document.getElementById('spoof').value === 'true';
        let duration = parseInt(document.getElementById('duration').value) || 30;

        addLog(`[INIT] Target: ${target} | ${method.toUpperCase()} | Thr:${threads} | Spoof:${spoof}`);
        active = true;
        pktCount = 0;
        updateStats();

        attackInterval = setInterval(() => {
            if (!active) { clearInterval(attackInterval); return; }
            let batch = Math.min(threads, 22);
            for (let i = 0; i < batch; i++) {
                pktCount++;
                let spoofPart = spoof ? ` | spoof: ${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}` : '';
                if (method === 'http') addLog(`[HTTP] GET → ${target}${spoofPart}`);
                else if (method === 'udp') addLog(`[UDP] ${target}:${Math.floor(Math.random()*60000)}${spoofPart}`);
                else if (method === 'syn') addLog(`[SYN] seq=${Math.floor(Math.random()*999999)} -> ${target}${spoofPart}`);
                else addLog(`[ICMP] ping ${target} id=${Math.floor(Math.random()*9999)}${spoofPart}`);
            }
            lastPps = Math.floor(batch * 4.5);
            updateStats();
        }, 180);

        if (duration > 0) stopTimeout = setTimeout(() => { if(active) { stopAttack(); addLog(`[FINISH] Attack done (${duration}s)`); } }, duration*1000);
    }

    document.getElementById('startBtn').addEventListener('click', startAttack);
    document.getElementById('stopBtn').addEventListener('click', stopAttack);
    setInterval(updateStats, 400);
</script>
</body>
</html>
